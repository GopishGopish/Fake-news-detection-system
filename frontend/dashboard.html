<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - TruthVerify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <div class="container py-5" id="dashboard-container">
        
        <!-- Alerts wrapper -->
        <div id="alert-box"></div>

        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stat-card border-0 animate-fade" style="animation-delay: 0.1s;">
                    <span id="total-analyses" class="stat-value text-primary">-</span>
                    <span class="stat-label">Total Analyses</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card border-0 animate-fade" style="animation-delay: 0.2s;">
                    <span id="real-count" class="stat-value text-success">-</span>
                    <span class="stat-label">Real News Detected</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card border-0 animate-fade" style="animation-delay: 0.3s;">
                    <span id="fake-count" class="stat-value text-danger">-</span>
                    <span class="stat-label">Fake News Detected</span>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stat-card border-0 animate-fade" style="animation-delay: 0.4s;">
                    <span id="total-users" class="stat-value text-info">-</span>
                    <span class="stat-label">Registered Users</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <div class="card border-0 animate-fade">
                    <div class="card-header bg-transparent border-0 p-4">
                        <h5 class="fw-bold text-white mb-0">Recent Platform Activity</h5>
                    </div>
                    <div class="card-body p-0">
                        <div class="table-responsive">
                            <table class="table table-dark table-hover mb-0">
                                <thead>
                                    <tr class="text-secondary" style="font-size: 0.8rem;">
                                        <th class="px-4">User ID</th>
                                        <th>Prediction</th>
                                        <th>Confidence</th>
                                        <th>Time</th>
                                    </tr>
                                </thead>
                                <tbody id="activity-table-body">
                                    <!-- Recent activity loaded dynamically by main.js -->
                                    <tr>
                                        <td colspan="4" class="text-center py-4 text-white-50">
                                            <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                            Loading activity...
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="card border-0 animate-fade">
                    <div class="card-header bg-transparent border-0 p-4">
                        <h5 class="fw-bold text-white mb-0">Distribution</h5>
                    </div>
                    <div class="card-body text-center p-5">
                        <div class="d-flex justify-content-between mb-2">
                            <span>Real News</span>
                            <span id="real-percent">-</span>
                        </div>
                        <div class="progress mb-4">
                           <div id="real-progress" class="progress-bar bg-success" role="progressbar" style="width: 0%"></div>
                        </div>

                        <div class="d-flex justify-content-between mb-2">
                            <span>Fake News</span>
                            <span id="fake-percent">-</span>
                        </div>
                        <div class="progress">
                           <div id="fake-progress" class="progress-bar bg-danger" role="progressbar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
