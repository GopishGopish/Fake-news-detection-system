<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyze News - TruthVerify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                
                <!-- Alerts wrapper -->
                <div id="alert-box"></div>

                <div class="card animate-fade shadow-lg border-0">
                    <div class="card-body p-5">
                        <h2 class="fw-bold text-center mb-4 text-white">News Content Analysis</h2>
                        <p class="text-center text-white-50 mb-5">Paste the news article or headline below to check its authenticity.</p>
                        
                        <form id="predictForm">
                            <div class="mb-4">
                                <textarea class="form-control" name="news_content" id="news_content" rows="8" placeholder="Start typing or paste news content here..." required></textarea>
                            </div>
                            <div class="d-grid shadow-sm">
                                <button type="submit" class="btn btn-primary btn-lg" id="analyzeBtn">
                                    <span id="btnText"><i class="fas fa-search me-2"></i>Analyze Now</span>
                                    <span id="btnLoading" class="d-none">
                                        <span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>
                                        Analyzing...
                                    </span>
                                </button>
                            </div>
                        </form>

                        <!-- Predictions result display area (controlled by JS) -->
                        <div id="result-section" class="mt-5 text-center p-4 rounded-3 border-dashed border-2 animate-fade d-none">
                            <h4 class="mb-3 text-secondary">Analysis Result</h4>
                            
                            <div id="result-badge" class="result-badge">
                                <i id="result-badge-icon" class="fas me-2"></i>
                                <span id="result-badge-text"></span>
                            </div>

                            <div class="mt-4">
                                <p class="text-white-50 mb-1">Confidence Score</p>
                                <div class="progress mx-auto" style="width: 50%;">
                                    <div id="confidence-bar" class="progress-bar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                                <span id="confidence-text" class="fw-bold mt-2 d-block">0.00%</span>
                            </div>
                        </div>
                        
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center mt-5">
        <div class="container">
            <p>&copy; 2024 TruthVerify Fake News Detection System.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
