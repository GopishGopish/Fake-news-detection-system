<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - TruthVerify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body class="d-flex flex-column align-items-center justify-content-center" style="min-height: 100vh;">
    <!-- Navigation Container -->
    <div id="navbar-container" class="w-100 position-absolute top-0"></div>

    <div class="container" style="margin-top: 100px;">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h1 class="text-primary fw-bold"><i class="fas fa-shield-alt me-2"></i>TruthVerify</h1>
                    </a>
                </div>

                <!-- Alerts wrapper -->
                <div id="alert-box"></div>

                <div class="card shadow-lg border-0 animate-fade">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4 fw-bold">Create Account</h3>
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label text-white-50">Username</label>
                                <input type="text" name="username" class="form-control" placeholder="johndoe" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-white-50">Email Address</label>
                                <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-white-50">Password</label>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary btn-lg">Register</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <p class="text-white-50">Already have an account? <a href="login.html" class="text-primary text-decoration-none fw-bold">Login</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
