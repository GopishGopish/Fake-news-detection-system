<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History - TruthVerify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="static/css/style.css">
</head>
<body>
    <!-- Navigation Container -->
    <div id="navbar-container"></div>

    <div class="container py-5">
        <h2 class="fw-bold mb-4 text-white">Your Analysis History</h2>
        
        <!-- Alerts wrapper -->
        <div id="alert-box"></div>

        <div class="card animate-fade border-0">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-dark table-hover mb-0">
                        <thead>
                            <tr class="text-secondary text-uppercase" style="font-size: 0.8rem;">
                                <th class="px-4 py-3">News Sample</th>
                                <th class="py-3">Prediction</th>
                                <th class="py-3">Confidence</th>
                                <th class="py-3">Date</th>
                            </tr>
                        </thead>
                        <tbody id="history-table-body">
                            <!-- History items loaded dynamically by main.js -->
                            <tr>
                                <td colspan="4" class="text-center py-5 text-white-50">
                                    <div class="spinner-border spinner-border-sm text-primary me-2" role="status"></div>
                                    Loading history...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/js/main.js"></script>
</body>
</html>
